name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{secrets.UESDK_PAT}}
          submodules: recursive
          fetch-depth: 0

      - name: Build
        run: call build.bat
        shell: cmd

      - name: Read base nightly tag
        run: |
          $tag = (Get-Content "${{github.workspace}}/BASE_NIGHTLY" -Raw).Trim()
          echo "NIGHTLY_TAG=$tag" >> $env:GITHUB_ENV
          if ($tag -match "nightly-(\d+)-") {
            $num = $Matches[1]
          } else {
            $num = "00000"
          }
          echo "NIGHTLY_NUM=$num" >> $env:GITHUB_ENV
          echo "ZIP_NAME=uevr-patched-$num-${{github.run_number}}" >> $env:GITHUB_ENV
        shell: powershell

      - name: Compress artifacts
        run: |
          echo ${{github.sha}} > ${{github.workspace}}/revision.txt
          7z a ${{github.workspace}}/${{env.ZIP_NAME}}.zip ${{github.workspace}}/build/bin/uevr/*
          7z a ${{github.workspace}}/${{env.ZIP_NAME}}.zip ${{github.workspace}}/build/bin/vr-plugin-nullifier/UEVRPluginNullifier.dll
          7z a ${{github.workspace}}/${{env.ZIP_NAME}}.zip ${{github.workspace}}/build/bin/LuaVR/LuaVR.dll
          7z a ${{github.workspace}}/${{env.ZIP_NAME}}.zip ${{github.workspace}}/revision.txt

      - name: Package plugins zip
        run: |
          $staging = "${{github.workspace}}/plugins-staging"
          New-Item -ItemType Directory -Path "$staging/plugins" -Force | Out-Null
          New-Item -ItemType Directory -Path "$staging/shipping_presets" -Force | Out-Null
          New-Item -ItemType Directory -Path "$staging/shader_assets" -Force | Out-Null

          # Copy shader DLLs (exclude example_plugin — glob is case-insensitive on Windows).
          # Bloom is intentionally excluded from releases: it's kept in-tree for possible
          # future fix attempts but does not work in VR-LDR (see docs/effect-runtime-plan.md
          # Phase 3 retrospective). Update this filter if Bloom is ever revived.
          Get-ChildItem "${{github.workspace}}/build/${{env.BUILD_TYPE}}/*Shader.dll" |
            Where-Object { $_.Name -match "^\d{2}_" -and $_.Name -notmatch "Bloom" } |
            Copy-Item -Destination "$staging/plugins/"

          # Copy license files (exclude Bloom — see filter above)
          Get-ChildItem "${{github.workspace}}/examples" -Recurse -Filter "*-LICENSE.txt" |
            Where-Object { $_.Name -notmatch "Bloom" } |
            Copy-Item -Destination "$staging/plugins/"

          # Copy shipping presets (flat *.uevrpreset files only — subfolders like
          # presets/experimental/ are intentionally excluded from releases).
          Get-ChildItem "${{github.workspace}}/presets/*.uevrpreset" -File |
            Copy-Item -Destination "$staging/shipping_presets/"

          # Copy shipped shader assets (LUT pngs, etc.) flat into shader_assets/.
          # install-plugins.bat detects this layout (vs dev examples/<plugin>/assets/)
          # and copies into <UEVR_root>/data/plugins/shader_assets/, which is the
          # fallback path resolve_shader_asset_path() consults at runtime.
          # Excludes assets belonging to plugins not shipped (e.g. Bloom — see DLL filter above).
          $excludedAssetPlugins = @('bloom_plugin')
          Get-ChildItem "${{github.workspace}}/examples" -Directory |
            Where-Object { $excludedAssetPlugins -notcontains $_.Name } |
            ForEach-Object {
              $assetsDir = Join-Path $_.FullName 'assets'
              if (Test-Path $assetsDir) {
                Get-ChildItem $assetsDir -File | Copy-Item -Destination "$staging/shader_assets/"
              }
            }

          # Copy install/uninstall scripts
          Copy-Item "${{github.workspace}}/install-plugins.bat" "$staging/"
          Copy-Item "${{github.workspace}}/uninstall-plugins.bat" "$staging/"

          # Create zip
          7z a "${{github.workspace}}/uevr-plugins-${{env.NIGHTLY_NUM}}-${{github.run_number}}.zip" "$staging/*"
        shell: powershell

      - name: Hash zips
        run: |
          $mainHash = Get-FileHash -Algorithm SHA256 ${{github.workspace}}/${{env.ZIP_NAME}}.zip
          $mainHash.Hash | Out-File -FilePath ${{github.workspace}}/${{env.ZIP_NAME}}.zip.sha256
          $pluginZip = "${{github.workspace}}/uevr-plugins-${{env.NIGHTLY_NUM}}-${{github.run_number}}.zip"
          $pluginHash = Get-FileHash -Algorithm SHA256 $pluginZip
          $pluginHash.Hash | Out-File -FilePath "$pluginZip.sha256"
        shell: powershell

      - name: Generate release notes
        run: |
          $tag = "${{env.NIGHTLY_TAG}}"
          $nightlyUrl = "https://github.com/praydog/UEVR-nightly/releases/tag/$tag"

          # Don't let native-command non-zero exits become terminating errors
          # (windows-latest PowerShell defaults can make `git describe` failure throw).
          $ErrorActionPreference = 'Continue'
          $PSNativeCommandUseErrorActionPreference = $false

          $lastTag = $null
          try {
            $lastTag = & git describe --tags --abbrev=0 2>$null
            if ($LASTEXITCODE -ne 0) { $lastTag = $null }
          } catch {
            $lastTag = $null
          }
          $global:LASTEXITCODE = 0

          if ($lastTag) {
            $allCommits = & git log --pretty=format:"%s (%h)" "$lastTag..HEAD"
          } else {
            $allCommits = & git log --pretty=format:"%s (%h)" -20
          }
          $global:LASTEXITCODE = 0
          if (-not $allCommits) {
            $allCommits = & git log --pretty=format:"%s (%h)" -20
          }
          if ($allCommits -is [string]) { $allCommits = @($allCommits) }
          $filtered = $allCommits | Where-Object { $_ -match "^(fix|feat)" }
          $log = ($filtered | ForEach-Object { "- $_" }) -join "`n"
          if (-not $log) { $log = "- No fix/feat commits in this build" }

          $lines = @(
            "## How to install",
            "",
            "1. Download the **base UEVR nightly** this build is patched against:",
            "   **[$tag]($nightlyUrl)**",
            "2. Extract the nightly zip to a folder.",
            "3. Download **${{env.ZIP_NAME}}.zip** from this release.",
            "4. Extract and **overwrite/replace** the files from step 2 with the files from this release.",
            "5. Download **uevr-plugins-${{env.NIGHTLY_NUM}}-${{github.run_number}}.zip** and run ``install-plugins.bat`` to install shaders and presets.",
            "   Or install manually -- see [INSTALL.md](https://github.com/${{github.repository}}/blob/${{github.sha}}/docs/INSTALL.md).",
            "6. Run UEVR as normal.",
            "",
            "> **Note:** The post-processing shaders require this patched fork. They will **not** load on stock UEVR nightly.",
            "",
            "## Changes",
            $log
          )
          $lines -join "`n" | Out-File -FilePath ${{github.workspace}}/RELEASE_NOTES.md -Encoding utf8
        shell: powershell

      - name: Create annotated tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "patched-${{env.NIGHTLY_NUM}}-${{github.run_number}}" -m "UEVR Patched ${{env.NIGHTLY_NUM}}-${{github.run_number}}"
          git push origin "patched-${{env.NIGHTLY_NUM}}-${{github.run_number}}"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: patched-${{env.NIGHTLY_NUM}}-${{github.run_number}}
          name: "UEVR Patched ${{env.NIGHTLY_NUM}}-${{github.run_number}} (${{github.sha}})"
          artifacts: "${{github.workspace}}/${{env.ZIP_NAME}}.zip,${{github.workspace}}/${{env.ZIP_NAME}}.zip.sha256,${{github.workspace}}/uevr-plugins-${{env.NIGHTLY_NUM}}-${{github.run_number}}.zip,${{github.workspace}}/uevr-plugins-${{env.NIGHTLY_NUM}}-${{github.run_number}}.zip.sha256"
          bodyFile: ${{github.workspace}}/RELEASE_NOTES.md
          makeLatest: true
          token: ${{secrets.GITHUB_TOKEN}}
